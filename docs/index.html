<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OffroadMate — Legal</title>
  <meta name="description" content="Privacy Policy and Terms of Service for the OffroadMate mobile application." />
  <style>
    :root {
      --bg: #0f1115;
      --card: #161a21;
      --fg: #f4f6f8;
      --muted: #9aa4b2;
      --accent: #f97316;
      --border: #262c36;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f8fa;
        --card: #ffffff;
        --fg: #15181d;
        --muted: #5b6573;
        --accent: #ea580c;
        --border: #e4e7ec;
      }
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.65;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap {
      max-width: 560px;
      width: 100%;
      padding: 48px 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 28px;
    }
    .badge {
      display: inline-block;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    p { color: var(--muted); font-size: 15px; margin: 0 0 24px; }
    .links { display: grid; gap: 12px; }
    .link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--fg);
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: border-color 0.15s ease;
    }
    .link:hover { border-color: var(--accent); }
    .link .arrow { color: var(--accent); font-size: 18px; }
    footer {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <span class="badge">OffroadMate</span>
      <h1>Legal</h1>
      <p>Privacy Policy and Terms of Service for the OffroadMate mobile application.</p>
      <div class="links">
        <a class="link" href="./privacy/">Privacy Policy <span class="arrow">&rarr;</span></a>
        <a class="link" href="./terms/">Terms of Service <span class="arrow">&rarr;</span></a>
      </div>
    </div>
    <footer>&copy; 2026 OffroadMate. All rights reserved.</footer>
  </div>
</body>
</html>
